spring.datasource.url=jdbc:h2:./data/omnissa-approval;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.jpa.hibernate.ddl-auto=update
server.port=8081

spring.resources.static-locations=file:./ext-web/,classpath:/static/

# Mail configuration - uncomment and configure one of the options below

