spring.datasource.url=jdbc:h2:./data/omnissa-approval;AUTO_SERVER=TRUE;DB_CLOSE_ON_EXIT=FALSE
spring.jpa.hibernate.ddl-auto=update
server.port=8081

spring.web.resources.static-locations=file:./ext-web/,classpath:/static/

# ── Omnissa Access bootstrap (first-run auto-configuration) ──────────────────
# Set these via environment variables or application-local.properties (gitignored).
# The app will seed the database on first startup if these are present.
#
#   Environment variable form (recommended for Docker/production):
#     OMNISSA_BOOTSTRAP_URL=<tenant>.wss.workspaceone.com
#     OMNISSA_BOOTSTRAP_CLIENT_ID=<clientId>
#     OMNISSA_BOOTSTRAP_CLIENT_SECRET=<secret>
#
# Defaults are empty — setup wizard will prompt if not provided.
omnissa.bootstrap.url=
omnissa.bootstrap.client-id=
omnissa.bootstrap.client-secret=
omnissa.bootstrap.admin-username=
omnissa.bootstrap.admin-password=
omnissa.bootstrap.admin-email=
omnissa.admin-oauth.issuer-uri=
omnissa.admin-oauth.disable-consent=false

# ── Mail (uncomment one option) ──────────────────────────────────────────────
# Gmail SMTP (use an App Password if 2FA is enabled):
#spring.mail.host=smtp.gmail.com
