# AUTO_SERVER cannot be combined with DB_CLOSE_ON_EXIT=FALSE (H2 rejects it at connect time)
spring.datasource.url=jdbc:h2:./data/omnissa-approval;DB_CLOSE_ON_EXIT=FALSE
spring.jpa.hibernate.ddl-auto=update
server.port=8081

# Honor X-Forwarded-Proto/Host/Port from the reverse proxy (Caddy or nginx).
# Without this, OAuth2 redirect URIs are generated as http:// behind a TLS-terminating
# proxy and the login flow fails. Safe when no proxy is present — the filter only
# acts when the headers exist.
server.forward-headers-strategy=framework

spring.web.resources.static-locations=file:./ext-web/,classpath:/static/

# ── Omnissa Access bootstrap (first-run auto-configuration) ──────────────────
# Set these via environment variables or application-local.properties (gitignored).
# The app will seed the database on first startup if these are present.
#
#   Environment variable form (recommended for Docker/production):
#     OMNISSA_BOOTSTRAP_URL=<tenant>.wss.workspaceone.com
#     OMNISSA_BOOTSTRAP_CLIENT_ID=<clientId>
#     OMNISSA_BOOTSTRAP_CLIENT_SECRET=<secret>
#
# Defaults are empty — setup wizard will prompt if not provided.
omnissa.bootstrap.url=
omnissa.bootstrap.client-id=
omnissa.bootstrap.client-secret=
omnissa.bootstrap.admin-username=
omnissa.bootstrap.admin-password=
omnissa.bootstrap.admin-email=
omnissa.admin-oauth.issuer-uri=
omnissa.admin-oauth.disable-consent=false

# ── Security options ─────────────────────────────────────────────────────────
# Optional HTTP Basic auth on the inbound callout endpoint (POST /api/approvals/new).
# When the username is non-blank, Omnissa Access must send matching Basic
# credentials (configure them in the Access approvals settings). OPTIONS probes
# stay unauthenticated. Env: OMNISSA_API_USERNAME / OMNISSA_API_PASSWORD.
omnissa.api.username=
omnissa.api.password=
# Set true to disable local username/password login entirely (OAuth2-only mode).
# Env: OMNISSA_AUTH_LOCAL_LOGIN_DISABLED. Requires a working admin OAuth2 client.
omnissa.auth.local-login-disabled=false
# Rate limit on the inbound callout endpoint (POST /api/approvals/new):
# maximum requests per minute per client IP; 0 disables rate limiting.
# Env: OMNISSA_API_RATE_LIMIT.
omnissa.api.rate-limit=60

# ── Webhook notifications ─────────────────────────────────────────────────────
# POST a notification to a webhook whenever a new activation request arrives.
# Blank URL disables it. Format: generic (JSON event) | slack | teams.
# Env: WEBHOOK_URL / WEBHOOK_FORMAT.
webhook.url=
webhook.format=generic

# ── Actionable Slack approvals (#50) ──────────────────────────────────────────
# When true AND webhook.format=slack, the new-request notification is an
# interactive message with a duration menu + Approve/Reject buttons posted to
# webhook.url (a Slack incoming webhook). Env: SLACK_ACTIONABLE.
slack.actionable=false
# Slack app signing secret — verifies inbound interaction callbacks
# (POST /api/slack/interactions). Required for actionable approvals.
# Env: SLACK_SIGNING_SECRET.
slack.signing-secret=
# Authorized approvers: comma-separated slackUserId:appIdentity pairs, e.g.
# U0123ABC:dean@flaming.ws,U0456DEF:jane. A clicking Slack user not listed here
# is rejected — workspace membership alone never grants decision rights.
# Env: SLACK_APPROVER_MAP.
slack.approver-map=

# ── Log export ────────────────────────────────────────────────────────────────
# Forward application logs to a syslog server. Blank host disables it.
# syslog.port is a port NUMBER only (e.g. 514); the transport is selected by
# syslog.protocol: udp (default) | tcp | tls. Values are case-insensitive;
# an unknown value logs a warning and falls back to udp.
# Env: SYSLOG_HOST / SYSLOG_PORT / SYSLOG_PROTOCOL.
syslog.host=
syslog.port=514
syslog.protocol=udp

# TLS options — used only when syslog.protocol=tls.
# Server trust: platform default trust store, unless a CA bundle is provided
# below (use it for private or self-signed syslog server certificates).
# Client certificate auth (mutual TLS): set BOTH the client cert and key. The
# key must be unencrypted PKCS#8 ("BEGIN PRIVATE KEY"); convert legacy
# PKCS#1/SEC1 keys with `openssl pkcs8 -topk8 -nocrypt`.
# Each item accepts inline PEM text or a file path; the *-file variant takes
# precedence when both are set. File paths are container paths — keep the
# files under /app/data/certs/ (the persistent volume in Docker deployments).
# Env: SYSLOG_CLIENT_CERT_PEM / SYSLOG_CLIENT_KEY_PEM / SYSLOG_CA_PEM /
#      SYSLOG_CLIENT_CERT_FILE / SYSLOG_CLIENT_KEY_FILE / SYSLOG_CA_FILE.
syslog.client-cert-pem=
syslog.client-key-pem=
syslog.ca-pem=
syslog.client-cert-file=
syslog.client-key-file=
syslog.ca-file=

# ── Mail (uncomment one option) ──────────────────────────────────────────────
# Mail is optional — keep an unreachable/unset SMTP server from flipping
# /actuator/health to DOWN (which fails the Docker healthcheck).
management.health.mail.enabled=false

# Sender address for requester notifications — must be permitted by the relay
# (Office 365 requires an accepted-domain address matching the account).
# Env: SPRING_MAIL_FROM.
spring.mail.from=no-reply@example.com

# Gmail SMTP (use an App Password if 2FA is enabled):
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=your_account@gmail.com
#spring.mail.password=your_app_password
#spring.mail.properties.mail.smtp.starttls.enable=true

# Standard SMTP on port 25:
#spring.mail.host=mysmtp.company.com

#spring.mail.properties.mail.debug=true

# ── SSL / TLS (standalone mode — not used with Caddy) ────────────────────────
# Place keystore.p12 in the config/ directory (gitignored).
# Generate via:  scripts/gen-dev-cert.sh      (self-signed, dev only)
#                scripts/import-cert.sh        (from PEM cert + key)
#
# Uncomment and set SSL_KEYSTORE_PASSWORD to enable:
#server.port=8443
#server.http.port=8080
#server.ssl.key-store=file:./config/keystore.p12
#server.ssl.key-store-type=PKCS12
#server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD:changeit}
#server.ssl.key-alias=omnissa-approval
#server.ssl.enabled=true
# TLS 1.2 minimum — disables deprecated TLS 1.0 / 1.1
#server.ssl.protocol=TLS
#server.ssl.enabled-protocols=TLSv1.2,TLSv1.3

# ── Health probe (used by Docker healthcheck) ─────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ── Admin OAuth2 Login (Omnissa Access as OIDC IdP) ─────────────────────────
# Values must be provided via environment variables or application-local.properties.
# Set client-id and client-secret to empty strings to disable OAuth2 login
# and fall back to local username/password only.
#
# Required Omnissa Access client config:
#   Type: User Access Token (Confidential)
#   Grant: Authorization Code
#   PKCE: enabled
#   Scopes: openid email profile
#   Redirect URI: https://<your-host>/login/oauth2/code/omnissa
#
spring.security.oauth2.client.registration.omnissa.client-id=${omnissa.admin-oauth.client-id:}
spring.security.oauth2.client.registration.omnissa.client-secret=${omnissa.admin-oauth.client-secret:}
spring.security.oauth2.client.registration.omnissa.redirect-uri=${omnissa.admin-oauth.redirect-uri:http://localhost:8081/login/oauth2/code/omnissa}
spring.security.oauth2.client.registration.omnissa.scope=openid,email,profile
spring.security.oauth2.client.registration.omnissa.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.omnissa.client-name=Omnissa Access

# Option A (preferred): OIDC auto-discovery — Spring fetches
#   <issuer-uri>/.well-known/openid-configuration at startup.
# Set omnissa.admin-oauth.issuer-uri (or OMNISSA_ADMIN_OAUTH_ISSUER_URI env var) to enable.
# Use https://<tenant>/SAAS/auth — the issuer advertised by the tenant's
# /.well-known/openid-configuration, NOT /acs. Leaving it blank skips OIDC
# discovery entirely.
spring.security.oauth2.client.provider.omnissa.issuer-uri=${omnissa.admin-oauth.issuer-uri:}

# Option B (manual fallback): uncomment these and comment out issuer-uri above
#   if the /acs/.well-known/openid-configuration endpoint is unavailable.
#spring.security.oauth2.client.provider.omnissa.authorization-uri=https://${omnissa.bootstrap.url}/SAAS/auth/oauth2/authorize
#spring.security.oauth2.client.provider.omnissa.token-uri=https://${omnissa.bootstrap.url}/SAAS/auth/oauthtoken
#spring.security.oauth2.client.provider.omnissa.user-info-uri=https://${omnissa.bootstrap.url}/SAAS/jersey/manager/api/userinfo
#spring.security.oauth2.client.provider.omnissa.jwk-set-uri=https://${omnissa.bootstrap.url}/SAAS/API/1.0/REST/auth/token
#spring.security.oauth2.client.provider.omnissa.user-name-attribute=sub

