name: Publish container

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Read the app version straight from pom.xml so main-branch builds carry a
      # real, incrementing version tag (not just :latest). CasaOS's "Check and
      # update" reliably detects a moved *version* tag but special-cases :latest
      # as "always current" — so the deployment tracks the moving major.minor
      # tag (e.g. 1.4) published below.
      - name: Read project version
        id: ver
        run: |
          V=$(grep -m1 '<version>' pom.xml | sed -E 's/.*<version>([^<]+)<.*/\1/')
          echo "full=$V"        >> "$GITHUB_OUTPUT"
          echo "minor=${V%.*}"  >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/squidlyman/omnissa-access-approvals
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.full }},enable={{is_default_branch}}
            type=raw,value=${{ steps.ver.outputs.minor }},enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
