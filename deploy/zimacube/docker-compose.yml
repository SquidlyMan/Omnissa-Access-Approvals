# ZimaCube deployment — used by deploy.sh, safe for CasaOS adoption.
#
# Pulls the published image from GHCR (no local build) instead of using a
# build: context — if CasaOS adopts the app it copies this compose to
# /var/lib/casaos/apps/ and recreates the container, which would break a
# relative build path. Because the image lives in a public registry, CasaOS
# "Check and then update" works for updates. ALL state is bind-mounted to
# /media/ZIMARAID so a CasaOS-triggered recreate wipes nothing.

name: omnissa-approvals

services:
  omnissa-approvals:
    image: ghcr.io/squidlyman/omnissa-access-approvals:latest
    container_name: omnissa-approvals
    restart: unless-stopped
    ports:
      # Bound to the LAN IP; note CasaOS adoption resets this to 0.0.0.0 —
      # the DOCKER-USER iptables rule (omnissa-approvals-fw.service) is what
      # actually keeps the port LAN-only.
      - "10.88.88.30:8081:8081"
    env_file:
      - /media/ZIMARAID/omnissa-approvals/omnissa-approvals.env
    environment:
      SERVER_PORT: 8081
    volumes:
      # H2 database — the only state the app writes (Spring workdir /app/data)
      - /media/ZIMARAID/omnissa-approvals/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

x-casaos:
  architectures: [amd64]
  main: omnissa-approvals
  author: dean@flaming.ws
  category: Utilities
  title:
    en_us: Access Approval Tool for Omnissa
  description:
    en_us: Independent approval workflow tool for Omnissa Access (Workspace ONE) application requests. Not an Omnissa product.
  icon: "data:image/svg+xml;base64,"
  port_map: "8081"
