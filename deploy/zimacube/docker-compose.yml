# ZimaCube deployment — used by deploy.sh, safe for CasaOS adoption.
#
# Pulls the published image from GHCR (no local build) instead of using a
# build: context — if CasaOS adopts the app it copies this compose to
# /var/lib/casaos/apps/ and recreates the container, which would break a
# relative build path. Update via deploy.sh, `docker compose pull` + `up -d`,
# or the opt-in watchtower service below — the CasaOS "Check and then update"
# button does NOT reliably detect new registry images for externally-managed
# containers. ALL state is bind-mounted to /media/ZIMARAID so a
# CasaOS-triggered recreate wipes nothing.

name: omnissa-approvals

services:
  omnissa-approvals:
    image: ghcr.io/squidlyman/omnissa-access-approvals:latest
    container_name: omnissa-approvals
    restart: unless-stopped
    labels:
      # Opt-in marker for the (disabled-by-default) watchtower service below.
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      # Bound to the LAN IP; note CasaOS adoption resets this to 0.0.0.0 —
      # the DOCKER-USER iptables rule (omnissa-approvals-fw.service) is what
      # actually keeps the port LAN-only.
      - "10.88.88.30:8081:8081"
    env_file:
      - /media/ZIMARAID/omnissa-approvals/omnissa-approvals.env
    environment:
      SERVER_PORT: 8081
    volumes:
      # H2 database — the only state the app writes (Spring workdir /app/data)
      - /media/ZIMARAID/omnissa-approvals/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional auto-updater — DISABLED BY DEFAULT. This service only runs when
  # the "autoupdate" compose profile is explicitly enabled:
  #   docker compose -f <this file> --profile autoupdate up -d
  # When enabled, Watchtower checks GHCR daily and pulls + recreates the
  # approvals container whenever a new image is published. It only manages
  # containers carrying the com.centurylinklabs.watchtower.enable label
  # (WATCHTOWER_LABEL_ENABLE) — nothing else on the host is touched. It
  # requires access to the Docker socket; that is the standard Watchtower
  # deployment model, but it grants the container control over Docker —
  # which is exactly why this ships disabled.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: omnissa-approvals-watchtower
    restart: unless-stopped
    profiles: ["autoupdate"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"   # only touch labeled containers
      WATCHTOWER_CLEANUP: "true"        # remove superseded images
      WATCHTOWER_POLL_INTERVAL: "86400" # daily; override via env if desired

x-casaos:
  architectures: [amd64]
  main: omnissa-approvals
  author: dean@flaming.ws
  category: Utilities
  title:
    en_us: Access Approval Tool for Omnissa
  description:
    en_us: Independent approval workflow tool for Omnissa Access (Workspace ONE) application requests. Not an Omnissa product.
  icon: "data:image/svg+xml;base64,"
  port_map: "8081"
